<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>injectCssTokens — Performance Benchmark</title>
</head>
<body>
  <pre id="status">Initializing WASM…</pre>
  <script type="module">
    // ── Import WASM bindings ────────────────────────────────────────────────
    const {
      default: wasmInit,
      ColorOklch,
      batch_derive_tokens,
    } = await import('/momoto_ui_core.js');

    await wasmInit('/momoto_ui_core_bg.wasm');
    document.getElementById('status').textContent = 'WASM ready — running benchmark…';

    // ── Brand constants (mirrors index.ts) ──────────────────────────────────
    const BRAND_FIRE  = { l: 0.62,  c: 0.22,  h: 38  };
    const BRAND_GOLD  = { l: 0.80,  c: 0.19,  h: 65  };
    const BRAND_EMBER = { l: 0.40,  c: 0.20,  h: 22  };
    const BRAND_SPARK = { l: 0.88,  c: 0.17,  h: 78  };
    const BRAND_BG    = { l: 0.04,  c: 0.01,  h: 30  };
    const BRAND_TEXT1 = { l: 0.94,  c: 0.012, h: 50  };
    const BRAND_TEXT2 = { l: 0.74,  c: 0.030, h: 50  };
    const BRAND_TEXT3 = { l: 0.52,  c: 0.040, h: 50  };

    // ── Helpers ─────────────────────────────────────────────────────────────
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // Batch derive: one WASM round-trip for 4 brand colors
    function batchDeriveColors(colors) {
      const input = new Float64Array(colors.length * 3);
      for (let i = 0; i < colors.length; i++) {
        input[i * 3]     = colors[i].l;
        input[i * 3 + 1] = colors[i].c;
        input[i * 3 + 2] = colors[i].h;
      }
      const output = batch_derive_tokens(input);
      const KEYS   = ['idle', 'hover', 'active', 'focus', 'disabled', 'loading'];
      const results = [];
      for (let ci = 0; ci < colors.length; ci++) {
        const base = ci * 6 * 4; // 6 states × 4 floats
        const out  = {};
        for (let si = 0; si < 6; si++) {
          const idx = base + si * 4;
          try {
            const c = new ColorOklch(output[idx], output[idx + 1], output[idx + 2]);
            out[KEYS[si]] = c.to_hex();
            c.free();
          } catch { out[KEYS[si]] = '#000000'; }
        }
        results.push(out);
      }
      return results;
    }

    // ── Core synchronous implementation of injectCssTokens() ────────────────
    // This mirrors the logic in src/lib/momoto/index.ts exactly.
    // Measured synchronously to isolate WASM computation from Promise overhead.
    function runInjectCssTokens() {
      const root = document.documentElement;
      const set  = (prop, val) => root.style.setProperty(prop, val);

      // 1. Batch derive all brand color states (1 WASM call)
      const [fireT, goldT, emberT, sparkT] = batchDeriveColors([
        BRAND_FIRE, BRAND_GOLD, BRAND_EMBER, BRAND_SPARK,
      ]);

      // 2. Success + error via hue rotation
      const successC  = new ColorOklch(0.55, 0.20, 145);
      const errorC    = new ColorOklch(0.50, 0.22, 25);
      const sHex      = successC.to_hex();
      const eHex      = errorC.to_hex();
      const sHover    = successC.shift_lightness( 0.06).to_hex();
      const eHover    = errorC.shift_lightness(   0.06).to_hex();
      const sActive   = successC.shift_lightness(-0.04).to_hex();
      const eActive   = errorC.shift_lightness(  -0.04).to_hex();
      successC.free(); errorC.free();

      // 3. Surface scale from BG (4 levels)
      const bg0 = new ColorOklch(BRAND_BG.l, BRAND_BG.c, BRAND_BG.h);
      const bg1 = bg0.shift_lightness(0.04);
      const bg2 = bg0.shift_lightness(0.08);
      const bg3 = bg0.shift_lightness(0.12);
      const surf = [bg0, bg1, bg2, bg3].map(c => { const h = c.to_hex(); c.free(); return h; });

      // 4. Text hierarchy (4 levels)
      const t1 = new ColorOklch(BRAND_TEXT1.l, BRAND_TEXT1.c, BRAND_TEXT1.h);
      const t2 = new ColorOklch(BRAND_TEXT2.l, BRAND_TEXT2.c, BRAND_TEXT2.h);
      const t3 = new ColorOklch(BRAND_TEXT3.l, BRAND_TEXT3.c, BRAND_TEXT3.h);
      const t4 = t3.shift_lightness(-0.20);
      const text = [t1, t2, t3, t4].map(c => { const h = c.to_hex(); c.free(); return h; });

      // 5. Raw brand hex values (5 colors)
      const brandHex = {};
      for (const [name, { l, c, h }] of [
        ['fire',  BRAND_FIRE ],
        ['gold',  BRAND_GOLD ],
        ['ember', BRAND_EMBER],
        ['spark', BRAND_SPARK],
        ['bg',    BRAND_BG   ],
      ]) {
        try {
          const color = new ColorOklch(l, c, h);
          brandHex[name] = color.to_hex();
          color.free();
        } catch { brandHex[name] = '#000000'; }
      }

      // 6. Inject all 55+ CSS custom properties
      // Fire primary (6 states)
      set('--m-btn-idle',     fireT.idle);
      set('--m-btn-hover',    fireT.hover);
      set('--m-btn-active',   fireT.active);
      set('--m-btn-focus',    fireT.focus);
      set('--m-btn-disabled', fireT.disabled);
      set('--m-btn-loading',  fireT.loading);
      // Gold accent (6 states)
      set('--m-accent-idle',     goldT.idle);
      set('--m-accent-hover',    goldT.hover);
      set('--m-accent-active',   goldT.active);
      set('--m-accent-focus',    goldT.focus);
      set('--m-accent-disabled', goldT.disabled);
      set('--m-accent-loading',  goldT.loading);
      // Ember deep red (6 states)
      set('--m-ember-idle',     emberT.idle);
      set('--m-ember-hover',    emberT.hover);
      set('--m-ember-active',   emberT.active);
      set('--m-ember-focus',    emberT.focus);
      set('--m-ember-disabled', emberT.disabled);
      set('--m-ember-loading',  emberT.loading);
      // Spark highlight (6 states)
      set('--m-spark-idle',     sparkT.idle);
      set('--m-spark-hover',    sparkT.hover);
      set('--m-spark-active',   sparkT.active);
      set('--m-spark-focus',    sparkT.focus);
      set('--m-spark-disabled', sparkT.disabled);
      set('--m-spark-loading',  sparkT.loading);
      // Semantic states
      set('--m-success-idle',   sHex);
      set('--m-success-hover',  sHover);
      set('--m-success-active', sActive);
      set('--m-error-idle',     eHex);
      set('--m-error-hover',    eHover);
      set('--m-error-active',   eActive);
      // Surface scale
      set('--m-surface-0', surf[0]);
      set('--m-surface-1', surf[1]);
      set('--m-surface-2', surf[2]);
      set('--m-surface-3', surf[3]);
      // Text hierarchy
      set('--m-text-1', text[0]);
      set('--m-text-2', text[1]);
      set('--m-text-3', text[2]);
      set('--m-text-4', text[3]);
      // Raw brand
      set('--m-brand-fire',  brandHex.fire);
      set('--m-brand-gold',  brandHex.gold);
      set('--m-brand-ember', brandHex.ember);
      set('--m-brand-spark', brandHex.spark);
      set('--m-brand-bg',    brandHex.bg);
      // Glow rgba
      set('--m-glow-fire',  hexToRgba(brandHex.fire,  0.40));
      set('--m-glow-gold',  hexToRgba(brandHex.gold,  0.35));
      set('--m-glow-ember', hexToRgba(brandHex.ember, 0.35));
      set('--m-glow-spark', hexToRgba(brandHex.spark, 0.30));
      // Border tokens
      set('--m-border-fire',  hexToRgba(brandHex.fire,  0.20));
      set('--m-border-gold',  hexToRgba(brandHex.gold,  0.22));
      set('--m-border-hover', hexToRgba(fireT.hover,    0.40));
    }

    // ── Benchmark loop ───────────────────────────────────────────────────────
    const WARMUP = 5;
    const ITERS  = 30;

    // Warm-up: allow JIT to optimise WASM bridge calls
    for (let i = 0; i < WARMUP; i++) runInjectCssTokens();

    // Measured iterations
    const samples = [];
    for (let i = 0; i < ITERS; i++) {
      const t0 = performance.now();
      runInjectCssTokens();
      samples.push(performance.now() - t0);
    }

    // ── Statistics ───────────────────────────────────────────────────────────
    samples.sort((a, b) => a - b);
    const p50  = samples[Math.floor(ITERS * 0.50)];
    const p95  = samples[Math.floor(ITERS * 0.95)];
    const p99  = samples[Math.min(Math.floor(ITERS * 0.99), ITERS - 1)];
    const mean = samples.reduce((a, b) => a + b, 0) / ITERS;
    const min  = samples[0];
    const max  = samples[ITERS - 1];

    // ── Expose results for Playwright ────────────────────────────────────────
    window.__PERF_RESULT__ = { samples, p50, p95, p99, mean, min, max, iters: ITERS };

    document.getElementById('status').textContent =
      `Done — p50: ${p50.toFixed(2)}ms  p95: ${p95.toFixed(2)}ms  ` +
      `mean: ${mean.toFixed(2)}ms  min: ${min.toFixed(2)}ms  max: ${max.toFixed(2)}ms`;
  </script>
</body>
</html>
