<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1200"
     viewBox="0 0 860 1200" role="img"
     aria-label="Halcon CLI — Halcon CLI — Commands">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c41400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e85200"  stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect width="860" height="1200" rx="10" ry="10"
        fill="#070401" stroke="#e85200" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Title bar -->
  <rect width="860" height="40" rx="10" ry="10" fill="url(#headerGrad)" fill-opacity="0.25"/>
  <rect y="10" width="860" height="30" fill="url(#headerGrad)" fill-opacity="0.25"/>

  <!-- Window controls -->
  <circle cx="20"  cy="22" r="6" fill="#ee343b"    filter="url(#glow)"/>
  <circle cx="38"  cy="22" r="6" fill="#fdd506" filter="url(#glow)"/>
  <circle cx="56"  cy="22" r="6" fill="#57cb60"  filter="url(#glow)"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle"
        font-family="'Rajdhani','Montserrat',sans-serif" font-size="13px"
        font-weight="600" fill="#f0e8d8" opacity="0.85">Halcon CLI — Commands</text>

  <!-- Separator line -->
  <line x1="0" y1="40" x2="860" y2="40"
        stroke="#e85200" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Prompt line -->
  <text x="20" y="56"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="13px">
    <tspan fill="#c4b49a">~ </tspan><tspan fill="#e85200" font-weight="bold">❯ </tspan><tspan fill="#f0e8d8">halcon --help</tspan>
  </text>

  <!-- Output -->
  <text x="20" y="73" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >AI-powered CLI for software development</tspan></text>
    <text x="20" y="93" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="113" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Usage: halcon [OPTIONS] [COMMAND]</tspan></text>
    <text x="20" y="133" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="153" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Commands:</tspan></text>
    <text x="20" y="173" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  chat        Start an interactive chat session (default)</tspan></text>
    <text x="20" y="193" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  config      Manage configuration</tspan></text>
    <text x="20" y="213" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  init        Initialize Halcon in the current project</tspan></text>
    <text x="20" y="233" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  status      Show current status (provider, model, session)</tspan></text>
    <text x="20" y="253" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  auth        Manage API keys and authentication</tspan></text>
    <text x="20" y="273" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  trace       Export or inspect a session trace</tspan></text>
    <text x="20" y="293" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  replay      Replay a recorded session trace</tspan></text>
    <text x="20" y="313" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  agents      Manage declarative sub-agent configurations (Feature 4)</tspan></text>
    <text x="20" y="333" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  memory      Manage persistent semantic memory</tspan></text>
    <text x="20" y="353" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  metrics     Metrics and baseline analysis</tspan></text>
    <text x="20" y="373" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  doctor      Run runtime health diagnostics</tspan></text>
    <text x="20" y="393" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  tools       Tool diagnostics and health checks</tspan></text>
    <text x="20" y="413" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  lsp         Start a Language Server Protocol (LSP) server over stdio</tspan></text>
    <text x="20" y="433" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  mcp         Manage MCP (Model Context Protocol) server connections</tspan></text>
    <text x="20" y="453" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  mcp-server  Start an MCP server over stdio (for IDE sidecar integration)</tspan></text>
    <text x="20" y="473" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  serve       Start the control plane API server</tspan></text>
    <text x="20" y="493" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  theme       Theme generation and optimization</tspan></text>
    <text x="20" y="513" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  update      Update Halcon CLI to the latest version</tspan></text>
    <text x="20" y="533" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  plugin      Manage V3 plugins</tspan></text>
    <text x="20" y="553" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  audit       Compliance and audit export (SOC 2)</tspan></text>
    <text x="20" y="573" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  users       Manage user accounts and role assignments (RBAC)</tspan></text>
    <text x="20" y="593" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  schedule    Manage cron-based scheduled agent tasks (US-scheduler — PASO 4-C)</tspan></text>
    <text x="20" y="613" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  login       Log in to Cenzontle via Zuclubit SSO (shortcut for `auth sso-login cenzontle`)</tspan></text>
    <text x="20" y="633" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  help        Print this message or the help of the given subcommand(s)</tspan></text>
    <text x="20" y="653" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="673" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Options:</tspan></text>
    <text x="20" y="693" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  -m, --model &lt;MODEL&gt;</tspan></text>
    <text x="20" y="713" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          Model to use (e.g., &quot;claude-sonnet-4-5-20250929&quot;, &quot;llama3.2&quot;)</tspan></text>
    <text x="20" y="733" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          </tspan></text>
    <text x="20" y="753" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          [env: HALCON_MODEL=]</tspan></text>
    <text x="20" y="773" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="793" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  -p, --provider &lt;PROVIDER&gt;</tspan></text>
    <text x="20" y="813" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          Provider to use (e.g., &quot;anthropic&quot;, &quot;ollama&quot;)</tspan></text>
    <text x="20" y="833" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          </tspan></text>
    <text x="20" y="853" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          [env: HALCON_PROVIDER=]</tspan></text>
    <text x="20" y="873" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="893" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  -v, --verbose</tspan></text>
    <text x="20" y="913" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          Enable verbose output (sets log level to debug)</tspan></text>
    <text x="20" y="933" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="953" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >      --log-level &lt;LOG_LEVEL&gt;</tspan></text>
    <text x="20" y="973" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          Log level (trace, debug, info, warn, error)</tspan></text>
    <text x="20" y="993" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          </tspan></text>
    <text x="20" y="1013" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          [env: HALCON_LOG=]</tspan></text>
    <text x="20" y="1033" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          [default: warn]</tspan></text>
    <text x="20" y="1053" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="1073" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >      --trace-json</tspan></text>
    <text x="20" y="1093" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          Emit traces as JSON lines to stderr (for offline debugging / piping)</tspan></text>
    <text x="20" y="1113" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="1133" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >      --config &lt;CONFIG&gt;</tspan></text>
    <text x="20" y="1153" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >          Configuration file path</tspan></text>

  <!-- Bottom glow accent -->
  <rect y="1197" width="860" height="3" rx="0"
        fill="url(#headerGrad)" opacity="0.5"/>
</svg>