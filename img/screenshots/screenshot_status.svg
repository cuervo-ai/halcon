<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440"
     viewBox="0 0 700 440" role="img"
     aria-label="Halcon CLI — Halcon CLI — Status">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c41400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e85200"  stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect width="700" height="440" rx="10" ry="10"
        fill="#070401" stroke="#e85200" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Title bar -->
  <rect width="700" height="40" rx="10" ry="10" fill="url(#headerGrad)" fill-opacity="0.25"/>
  <rect y="10" width="700" height="30" fill="url(#headerGrad)" fill-opacity="0.25"/>

  <!-- Window controls -->
  <circle cx="20"  cy="22" r="6" fill="#ee343b"    filter="url(#glow)"/>
  <circle cx="38"  cy="22" r="6" fill="#fdd506" filter="url(#glow)"/>
  <circle cx="56"  cy="22" r="6" fill="#57cb60"  filter="url(#glow)"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle"
        font-family="'Rajdhani','Montserrat',sans-serif" font-size="13px"
        font-weight="600" fill="#f0e8d8" opacity="0.85">Halcon CLI — Status</text>

  <!-- Separator line -->
  <line x1="0" y1="40" x2="700" y2="40"
        stroke="#e85200" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Prompt line -->
  <text x="20" y="56"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="13px">
    <tspan fill="#c4b49a">~ </tspan><tspan fill="#e85200" font-weight="bold">❯ </tspan><tspan fill="#f0e8d8">halcon status</tspan>
  </text>

  <!-- Output -->
  <text x="20" y="73" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Halcon CLI v0.3.0</tspan></text>
    <text x="20" y="93" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="113" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Provider: anthropic</tspan></text>
    <text x="20" y="133" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Model:    claude-sonnet-4-6</tspan></text>
    <text x="20" y="153" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="173" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Configured providers:</tspan></text>
    <text x="20" y="193" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  openai: enabled, key set</tspan></text>
    <text x="20" y="213" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  deepseek: enabled, key missing</tspan></text>
    <text x="20" y="233" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  ollama: enabled, no key needed</tspan></text>
    <text x="20" y="253" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  anthropic: enabled, key set</tspan></text>
    <text x="20" y="273" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  gemini: enabled, key missing</tspan></text>
    <text x="20" y="293" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  claude_code: enabled, no key needed</tspan></text>
    <text x="20" y="313" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  cenzontle: not logged in  (run `halcon login cenzontle` to authenticate)</tspan></text>
    <text x="20" y="333" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="353" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Security:</tspan></text>
    <text x="20" y="373" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  PII detection: off</tspan></text>
    <text x="20" y="393" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  Audit trail:   on</tspan></text>

  <!-- Bottom glow accent -->
  <rect y="437" width="700" height="3" rx="0"
        fill="url(#headerGrad)" opacity="0.5"/>
</svg>