<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="420"
     viewBox="0 0 740 420" role="img"
     aria-label="Halcon CLI — Halcon CLI — Agent Registry">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c41400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e85200"  stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect width="740" height="420" rx="10" ry="10"
        fill="#070401" stroke="#e85200" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Title bar -->
  <rect width="740" height="40" rx="10" ry="10" fill="url(#headerGrad)" fill-opacity="0.25"/>
  <rect y="10" width="740" height="30" fill="url(#headerGrad)" fill-opacity="0.25"/>

  <!-- Window controls -->
  <circle cx="20"  cy="22" r="6" fill="#ee343b"    filter="url(#glow)"/>
  <circle cx="38"  cy="22" r="6" fill="#fdd506" filter="url(#glow)"/>
  <circle cx="56"  cy="22" r="6" fill="#57cb60"  filter="url(#glow)"/>

  <!-- Title -->
  <text x="370" y="26" text-anchor="middle"
        font-family="'Rajdhani','Montserrat',sans-serif" font-size="13px"
        font-weight="600" fill="#f0e8d8" opacity="0.85">Halcon CLI — Agent Registry</text>

  <!-- Separator line -->
  <line x1="0" y1="40" x2="740" y2="40"
        stroke="#e85200" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Prompt line -->
  <text x="20" y="56"
        font-family="'JetBrains Mono','Fira Code',monospace" font-size="13px">
    <tspan fill="#c4b49a">~ </tspan><tspan fill="#e85200" font-weight="bold">❯ </tspan><tspan fill="#f0e8d8">halcon agents list</tspan>
  </text>

  <!-- Output -->
  <text x="20" y="73" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >No agents registered.</tspan></text>
    <text x="20" y="93" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="113" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >To add a sub-agent, create a Markdown file with YAML frontmatter:</tspan></text>
    <text x="20" y="133" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  Project scope: .halcon/agents/&lt;name&gt;.md</tspan></text>
    <text x="20" y="153" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  User scope:    ~/.halcon/agents/&lt;name&gt;.md</tspan></text>
    <text x="20" y="173" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="193" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >Example (code-reviewer.md):</tspan></text>
    <text x="20" y="213" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  ---</tspan></text>
    <text x="20" y="233" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  name: code-reviewer</tspan></text>
    <text x="20" y="253" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  description: Expert code reviewer. Use after any code changes.</tspan></text>
    <text x="20" y="273" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  tools: [file_read, grep, glob]</tspan></text>
    <text x="20" y="293" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  model: haiku</tspan></text>
    <text x="20" y="313" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  max_turns: 15</tspan></text>
    <text x="20" y="333" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  ---</tspan></text>
    <text x="20" y="353" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"></text>
    <text x="20" y="373" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13px" xml:space="preserve"><tspan fill="#f0e8d8" >  You are an expert code reviewer. Focus on security and maintainability.</tspan></text>

  <!-- Bottom glow accent -->
  <rect y="417" width="740" height="3" rx="0"
        fill="url(#headerGrad)" opacity="0.5"/>
</svg>