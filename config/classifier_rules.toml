# ─── Guía de extensión ────────────────────────────────────────────────────────
#
# Para añadir un dominio nuevo (ej. "testing"):
#
#   1. En task_analyzer.rs → agregar TaskType::Testing + as_str() + from_str()
#   2. Aquí → agregar [[rule]] con task_type = "testing"
#   3. Aquí → agregar [[example]] con queries representativas
#   4. Sin tocar ninguna lógica de scoring — el engine lo recoge automáticamente
