# ─── Tier 1: señales débiles / polisémicas ───────────────────────────────────
#
# Phase 3 reduction: 1.0 → 0.4
# Rationale: these keywords are highly polysemous. "create" alone can mean
# code_generation, file_management, or configuration. The EmbeddingLayer
# resolves ambiguity when these fire — a lower score lets embedding win the
# blend (W_EMBEDDING_PRIMARY = 0.70 >> 0.40 × 0.30 = 0.12).
#
# Palabras mantenidas: solo las que tienen valor como señal mínima de intención.
# "revisar" eliminado (duplicado: ya está en Tier 2 research con base_score=2.0).

[[rule]]
task_type  = "code_generation"
base_score = 0.4
keywords   = [
  "write", "create", "build", "make", "develop",
  "escribe", "escribir", "crea", "crear", "construye",
]

[[rule]]
task_type  = "debugging"
base_score = 0.4
keywords   = [
  "bug", "error", "issue", "problem", "fails",
  "failure", "wrong", "incorrect", "unexpected",
  "fallo", "falla", "problema", "erróneo",
]

[[rule]]
task_type  = "research"
base_score = 0.4
keywords   = [
  "find", "search", "look up", "lookup", "research",
  "scan", "verify", "validate", "check",
  "busca", "buscar", "encuentra", "verificar", "validar",
  "comprobar",
]

[[rule]]
task_type  = "file_management"
base_score = 0.4
keywords   = ["delete", "remove", "move", "copy", "list", "show"]

