# Halcon Classifier Rules — Dynamic Configuration
#
# Este archivo reemplaza las reglas hardcoded del binario.
# Se puede editar sin recompilar. Halcon lo carga en el primer uso.
#
# Rutas de búsqueda (primera que exista gana):
#   1. ${HALCON_CLASSIFIER_RULES}       (variable de entorno)
#   2. .halcon/classifier_rules.toml    (proyecto)
#   3. ~/.halcon/classifier_rules.toml  (usuario)
#   4. config/classifier_rules.toml     (dev/instalación)
#   5. Reglas compiladas por defecto    (fallback siempre disponible)
#
# Estructura:
#   [[rule]]
#   task_type  = "debugging"   # valor de TaskType::as_str()
#   base_score = 2.0           # peso por keyword (ver escala abajo)
#   keywords   = ["fix", ...]  # lista de términos o frases
#
# Escala de base_score:
#   5.0  = comandos multi-palabra exactos (casi nunca ambiguos)
#   3.0  = sustantivos de dominio específico (audit, cve, stacktrace)
#   2.0  = verbos de intención fuertes (fix, implement, explain)
#   1.0  = señales débiles / polisémicas (find, create, error)
#
# Para agregar un TaskType nuevo:
#   1. Añadir la variante al enum TaskType en task_analyzer.rs
#   2. Agregar el as_str() correspondiente
#   3. Añadir [[rule]] aquí → cero cambios en lógica de clasificación

# ─── Tier 5: comandos git multi-palabra ───────────────────────────────────────

[[rule]]
task_type  = "git_operation"
base_score = 5.0
keywords   = [
  "git commit", "git status", "git diff", "git log",
  "git add", "git push", "git pull", "git fetch",
  "git branch", "git merge", "git rebase", "git stash",
  "git checkout", "git cherry-pick", "git bisect",
  "commit changes", "stage files", "push changes",
  "pull request", "merge request",
]

# ─── Tier 5: operaciones de archivo multi-palabra ─────────────────────────────

[[rule]]
task_type  = "file_management"
base_score = 5.0
keywords   = [
  "delete file", "remove file", "rename file",
  "move file", "copy file", "create directory",
  "create folder", "list files", "show files",
  "find files", "search files", "delete directory",
  "remove directory", "file permissions",
]

# ─── Tier 3: seguridad / compliance / auditoría ───────────────────────────────

[[rule]]
task_type  = "research"
base_score = 3.0
keywords   = [
  # Auditoría
  "audit", "auditar", "auditoria", "auditoría",
  # Compliance y estándares
  "compliance", "cumplimiento",
  "soc2", "soc 2", "sox", "gdpr", "hipaa",
  "iso27001", "iso 27001", "pci-dss", "pci dss",
  "nist", "fips",
  # Vulnerabilidad y seguridad ofensiva
  "vulnerability", "vulnerabilidad", "vulnerabilities",
  "cve", "cvss", "exploit", "zero-day", "0day",
  "pentest", "pen test", "penetration test", "penetration testing",
  "red team", "blue team",
  # SAST / DAST
  "sast", "dast", "sonarqube", "sonar", "checkmarx",
  "snyk", "trivy", "grype", "semgrep",
  "attack surface", "threat model", "threat modeling",
  "security assessment", "risk assessment",
]

# ─── Tier 3: señales de debugging precisas ───────────────────────────────────

[[rule]]
task_type  = "debugging"
base_score = 3.0
keywords   = [
  "stacktrace", "stack trace", "traceback",
  "segfault", "segmentation fault",
  "null pointer", "null reference", "nullpointerexception", "npe",
  "deadlock", "race condition", "livelock",
  "memory leak", "memory corruption", "use after free",
  "buffer overflow", "heap corruption",
  "undefined behavior", "ub", "asan",
  "panic at", "thread panicked",
  "core dump", "crash dump",
]

